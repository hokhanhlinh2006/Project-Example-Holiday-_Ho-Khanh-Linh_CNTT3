# ============================================================================
# SERVER CONFIGURATION
# ============================================================================
server.port=8080


# ============================================================================
# DATABASE CONFIGURATION (MYSQL 8)
# ============================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/hotel_management_sys?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123456789
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================================
# JPA & HIBERNATE CONFIGURATIONS
# ============================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================================================
# LOGGING SETTINGS
# ============================================================================
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.level.com.hotelmanagement=DEBUG

# ============================================================================
# JWT SECURITY PROPERTIES
# ============================================================================
# HS512 Base64-Encoded Key (Min 512 bits)
jwt.secret=9a4f2c8d3b7a1e5f8c6d4e2b0a9f8e7d6c5b4a3f2e1d0c9b8a7f6e5d4c3b2a10
# 15 Minutes expiration (in milliseconds)
jwt.expiration=86400000 

# 7 Days expiration (in milliseconds)
jwt.refresh-expiration=604800000
